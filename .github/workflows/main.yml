name: Generate Snake

on:
  # Har 24 soatda avtomatik ishga tushadi
  schedule:
    - cron: "0 */24 * * *"
  
  # Manual tarzda (qo'lda) ishga tushirish imkoniyati
  workflow_dispatch:
  
  # Har safar main branchga push bo'lganda ishlaydi
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Snake animatsiyasini yaratish
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: alibekshomurotov
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Yaratilgan fayllarni maxsus 'output' branchiga yuklash
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
